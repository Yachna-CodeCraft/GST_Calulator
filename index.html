<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>GST Calculator</title>
<link rel="stylesheet" href="style.css" />
  
</head>
<body>

<h1>GST Calculator</h1>
<p class="sub">Quick GST breakdown for invoices</p>

<div class="card">
  <label>Amount (₹)</label>
  <input type="number" id="amount" placeholder="e.g. 10000" oninput="calc()" />

  <label>GST Rate</label>
  <select id="rate" onchange="calc()">
    <option value="5">5%</option>
    <option value="12">12%</option>
    <option value="18" selected>18%</option>
    <option value="28">28%</option>
  </select>

  <label>Tax Type</label>
  <select id="type" onchange="calc()">
    <option value="intra">Intra-state (CGST + SGST)</option>
    <option value="inter">Inter-state (IGST)</option>
  </select>

  <div class="result" id="result">
    <div class="result-row"><span>Subtotal</span><span id="r-sub">₹0</span></div>
    <div class="result-row" id="r-tax1-row"><span id="r-tax1-lbl">CGST 9%</span><span id="r-tax1">₹0</span></div>
    <div class="result-row" id="r-tax2-row"><span id="r-tax2-lbl">SGST 9%</span><span id="r-tax2">₹0</span></div>
    <div class="result-row total"><span>Total</span><span id="r-total">₹0</span></div>
  </div>

  <a href="https://digitalheroesco.com" target="_blank" class="hero-btn">Built for Digital Heroes</a>
</div>

<footer>
  Made by <strong>Yachna</strong> · <a href="mailto:yachnar100@email.com">yachnar100@email.com</a>
</footer>

<script src="script.js"></script>
</body>
</html>
